services:
  typesense:
    image: typesense/typesense:27.1
    command: >
      --data-dir /data
      --api-key=devkey
      --listen-port 8108
      --enable-cors
    ports: ["8108:8108"]
    volumes:
      - ts_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8108/health | grep -q '\"ok\":true'"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build: .
    depends_on:
      typesense: { condition: service_healthy }
    environment:
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: "8108"
      TYPESENSE_API_KEY: devkey
      CORPUS_ROOT: /corpus
    volumes:
      - ../..:/corpus:ro
    ports: ["8000:8000"]

volumes:
  ts_data:
